<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Rayna 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(to bottom right, #ffd6e0, #fff5f7);
    text-align: center;
}

/* IMAGE CARD */
.card img {
    width: 90%;
    max-width: 500px;
    margin-top: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* BUTTON */
.btn {
    margin-top: 20px;
    background: #ff4d6d;o
    color: white;
    border: none;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

/* POPUP */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    transition: 0.3s;
    z-index: 10;
}

.popup.active {
    transform: translate(-50%, -50%) scale(1);
}

.popup h2 {
    color: #ff4d6d;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    top: 0;
    left: 0;
    display: none;
}

.overlay.active {
    display: block;
}

/* FLOATING HEARTS */
.heart {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(0);}
    100% {transform: translateY(-100vh);}
}
</style>

</head>

<body>

<div class="card">
    <!-- PUT YOUR IMAGE NAME HERE -->
    <img src="apology.png" alt="Sorry Rayna">
</div>

<button class="btn" onclick="openPopup()">Tap here if you're still angry 😡</button>

<div class="overlay" id="overlay"></div>

<div class="popup" id="popup">
    <h2>YAYYY 💖</h2>
    <p>
        Raynaaa CUTIIIEEE 🥺<br><br>
        Thank you for forgiving me 😭<br>
        Sorish promises unlimited kinderjoy 🍫 + waffles 🧇<br><br>
        Ab smile karo 😌💖
    </p>
    <button class="btn" onclick="closePopup()">Close</button>
</div>

<script>
function openPopup() {
    document.getElementById("popup").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closePopup() {
    document.getElementById("popup").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

// floating hearts
for(let i=0;i<25;i++){
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (3 + Math.random()*3) + "s";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
